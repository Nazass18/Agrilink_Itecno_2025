<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriLink – Buyer Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 font-extrabold text-2xl"><span class="w-8 h-8 rounded-full bg-lime-500"></span>AgriLink</a>
      <a class="text-sm underline" href="login.html">Logout</a>
    </div>
    <h1 class="mt-6 text-3xl font-extrabold">Buyer Dashboard</h1>
    <div class="mt-6 grid lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-2xl p-5 shadow border border-slate-100 lg:col-span-2">
        <h3 class="font-semibold">Browse Catalog</h3>
        <p class="text-sm text-slate-600">Go to <a class="underline" href="catalog.html">Catalog</a> to add items.</p>
        <h3 class="mt-6 font-semibold">Create Quest</h3>
        <a href="quest.html" class="inline-block mt-2 px-4 py-2 rounded-lg bg-lime-600 text-white">New Quest</a>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow border border-slate-100">
        <h3 class="font-semibold">Orders</h3>
        <ul class="mt-3 text-sm space-y-2">
          <li>ORD-1001 — In Transit <a class="underline" href="tracking.html">Track</a></li>
          <li>ORD-0998 — Delivered</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
