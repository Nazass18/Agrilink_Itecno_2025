<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriLink – Seller Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2 font-extrabold text-2xl"><span class="w-8 h-8 rounded-full bg-lime-500"></span>AgriLink</a>
      <a class="text-sm underline" href="login.html">Logout</a>
    </div>
    <h1 class="mt-6 text-3xl font-extrabold">Seller Dashboard</h1>

    <div class="mt-6 grid lg:grid-cols-3 gap-6">
      <div class="bg-white rounded-2xl p-5 shadow border border-slate-100 lg:col-span-2">
        <h3 class="font-semibold">Stock Management</h3>
        <div class="grid md:grid-cols-4 gap-3 mt-3">
          <input id="pname" class="rounded-lg border-slate-300" placeholder="Product" />
          <select id="pgrade" class="rounded-lg border-slate-300"><option>A</option><option>B</option><option>C</option></select>
          <input id="pqty" type="number" class="rounded-lg border-slate-300" placeholder="Qty kg" />
          <button onclick="addStock()" class="rounded-lg bg-lime-600 text-white px-4">Add</button>
        </div>
        <div id="stock" class="mt-4 text-sm"></div>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow border border-slate-100">
        <h3 class="font-semibold">Orders & Quests</h3>
        <ul id="orders" class="mt-3 text-sm space-y-2"></ul>
      </div>

      <div class="bg-white rounded-2xl p-5 shadow border border-slate-100 lg:col-span-3">
        <h3 class="font-semibold">Upload Product</h3>
        <div class="grid md:grid-cols-4 gap-3 mt-3">
          <input class="rounded-lg border-slate-300" placeholder="Name" />
          <input class="rounded-lg border-slate-300" placeholder="Price /kg" type="number" />
          <input class="rounded-lg border-slate-300" placeholder="Image URL" />
          <button class="rounded-lg bg-sky-600 text-white px-4">Publish</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const stock = [];
    function addStock(){
      stock.push({name: pname.value, grade: pgrade.value, qty: Number(pqty.value||0)});
      renderStock();
    }
    function renderStock(){
      stockEl.innerHTML = '';
    }
    const stockEl = document.getElementById('stock');
    const ordersEl = document.getElementById('orders');
    // mock
    ordersEl.innerHTML = '<li>Quest #Q-1023: Red Chili A – Offer sent</li><li>Order ORD-1001: Preparing shipment</li>';
  </script>
</body>
</html>
