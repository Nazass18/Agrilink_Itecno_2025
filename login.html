<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriLink – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow p-6">
    <a href="index.html" class="flex items-center gap-2 font-extrabold text-xl mb-6"><span class="w-8 h-8 bg-lime-500 rounded-full"></span>AgriLink</a>
    <h1 class="text-2xl font-bold">Welcome back</h1>
    <p class="text-slate-600 text-sm mt-1">Sign in to continue</p>
    <form class="mt-6 space-y-4" onsubmit="event.preventDefault(); window.location.href='buyer-dashboard.html';">
      <div>
        <label class="text-sm font-medium">Email</label>
        <input type="email" required class="mt-1 w-full rounded-lg border-slate-300 focus:ring-lime-500 focus:border-lime-500" placeholder="you@example.com" />
      </div>
      <div>
        <label class="text-sm font-medium">Password</label>
        <input type="password" required class="mt-1 w-full rounded-lg border-slate-300 focus:ring-lime-500 focus:border-lime-500" />
      </div>
      <div class="flex items-center justify-between text-sm">
        <label class="inline-flex items-center gap-2"><input type="checkbox" class="rounded border-slate-300"> Remember me</label>
        <a href="#" class="text-lime-700">Forgot?</a>
      </div>
      <button class="w-full py-2.5 rounded-lg bg-lime-600 text-white font-semibold hover:bg-lime-700">Login</button>
    </form>
    <p class="text-sm text-slate-600 mt-4">No account? <a class="text-lime-700" href="register.html">Register</a></p>
  </div>
</body>
</html>
