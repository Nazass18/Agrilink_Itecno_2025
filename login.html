<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriLink – Masuk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .eye-btn { background: none; border: none; cursor: pointer; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
    .eye-btn:hover { color: #475569; }
  </style>
</head>
<body class="min-h-screen text-slate-900" style="background-image:url('bg-all.png'); background-size:cover; background-repeat:no-repeat; background-position:center;">
  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 border border-white">
      <a href="index.html" class="flex items-center gap-2 font-extrabold text-2xl mb-8">
        <span class="w-8 h-8 bg-lime-500 rounded-full"></span>AgriLink
      </a>
      <h1 class="text-2xl font-bold">Selamat Datang Kembali</h1>
      <p class="text-slate-600 text-sm mt-1">Masuk untuk melanjutkan ke akun Anda.</p>

      <form id="loginForm" class="mt-6 space-y-4" novalidate>
        <div>
          <label class="text-sm font-medium text-slate-700" for="email">Email</label>
          <input id="email" type="email" required autocomplete="email" placeholder="anda@contoh.com" class="mt-1" />
          <p class="err hidden mt-1 text-xs text-red-500" id="emailErr"></p>
        </div>
        <div>
          <label class="text-sm font-medium text-slate-700" for="password">Password</label>
          <div class="relative mt-1">
            <input id="password" type="password" required autocomplete="current-password" placeholder="Minimal 6 karakter" class="pr-10" />
            <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">👁</button>
          </div>
          <p class="err hidden mt-1 text-xs text-red-500" id="passErr"></p>
        </div>
        <div class="flex items-center justify-between text-sm">
          <label class="inline-flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded accent-lime-600" style="width:16px;height:16px;border:1px solid #cbd5e1;"> Ingat saya
          </label>
          <a href="#" class="text-lime-700 hover:underline" onclick="showToast('Fitur reset password segera hadir.')">Lupa password?</a>
        </div>
        <button type="submit" id="loginBtn" class="w-full py-3 rounded-full bg-lime-600 text-white font-semibold hover:bg-lime-700 transition flex items-center justify-center gap-2">
          <span id="loginBtnText">Masuk</span>
          <svg id="loginSpinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-sm text-slate-600">Belum punya akun? <a class="text-lime-700 font-semibold hover:underline" href="register.html">Daftar</a></p>
      </div>

      <div class="mt-4 pt-4 border-t border-slate-100 text-center">
        <p class="text-xs text-slate-400">Demo: gunakan email & password apapun</p>
      </div>
    </div>
  </div>

  <script src="assets/js/nav.js"></script>
  <script>
    // Password toggle
    const eyeBtn = document.getElementById('eyeBtn');
    const passwordInput = document.getElementById('password');
    eyeBtn.addEventListener('click', function() {
      const isText = passwordInput.type === 'text';
      passwordInput.type = isText ? 'password' : 'text';
      eyeBtn.textContent = isText ? '👁' : '🙈';
    });

    // Form validation & submit
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;
      let valid = true;

      document.getElementById('emailErr').classList.add('hidden');
      document.getElementById('passErr').classList.add('hidden');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailErr').textContent = 'Masukkan email yang valid.';
        document.getElementById('emailErr').classList.remove('hidden');
        valid = false;
      }
      if (!pass || pass.length < 6) {
        document.getElementById('passErr').textContent = 'Password minimal 6 karakter.';
        document.getElementById('passErr').classList.remove('hidden');
        valid = false;
      }
      if (!valid) return;

      // Show loading
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('loginBtnText');
      const spinner = document.getElementById('loginSpinner');
      btn.disabled = true;
      btnText.textContent = 'Memproses...';
      spinner.classList.remove('hidden');

      // Simulate API call
      setTimeout(() => {
        // Demo: seller@agrilink.id → seller dashboard, others → buyer dashboard
        if (email.toLowerCase().includes('seller')) {
          window.location.href = 'seller-dashboard.html';
        } else {
          window.location.href = 'buyer-dashboard.html';
        }
      }, 1200);
    });
  </script>
</body>
</html>
